<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>tEST</title>
    <style>
        body {
            background-image: url('https://luchenator.dev/assets/backgrounds/backgroundbulletinboard.png');
            background-color: rgba(76, 20, 2, 0.25);
            background-blend-mode: multiply;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <a href="">hello</a>
    <h2>hello again</h2>
    <h3>hello again but third time</h3>
    <button id="monke" type="button">click me!</button>
    <dialog id="dialog">
        <form method="dialog">
            <p>hi!!</p>
            <menu>
                <button id="closeBtn">Close</button>
            </menu>
        </form>
    </dialog>
    <script>
        const btn = document.getElementById("monke");
        const dialog = document.getElementById("dialog");
        const closeBtn = document.getElementById("closeBtn");

        if (btn && dialog) {
            btn.addEventListener('click', () => {
                    dialog.showModal();
            });
        }
    </script>
</body>
</html>
