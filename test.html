<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Test</title>
    <style>
        @font-face {
            font-family: "Cat Song";
            src: url("https://the-hubb.vercel.app/assets/Cat%20Song.otf") format("opentype");
        }
        /* Container hides the horizontal scrollbar and any outer items */
.carousel-container {
  overflow: hidden;
  width: 100%;
  background-color: #f4f4f4;
  padding: 20px 0;
}

/* The track is twice as wide as a single set of items */
.carousel-track {
  display: flex;
  width: max-content;
  /* Adjust '20s' to change the scrolling speed */
  animation: scrollLinear 20s linear infinite; 
}

/* Individual card styling */
.carousel-card {
  width: 200px;
  height: 100px;
  background-color: #007bff;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  font-weight: bold;
  border-radius: 8px;
  margin: 0 15px; /* Creates spacing between cards */
}
/* The animation that drives the infinite loop */
@keyframes scrollLinear {
  0% {
    transform: translateX(0);
  }
  100% {
    /* Moves exactly half the width of the combined total track */
    transform: translateX(-50%); 
  }
}

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        body strong {
            font-family: "Cat Song";
        }
    </style>
</head>
<body>
    <!-- The outer container hides everything that overflows the screen -->
<div class="carousel-container">
  
  <!-- The inner track moves horizontally via CSS animation -->
  <div class="carousel-track">
    
    <!-- First set of items -->
    <div class="carousel-card" onclick="item(this)">Item 1</div>
    <div class="carousel-card" onclick="item(this)">Item 2</div>
    <div class="carousel-card" onclick="item(this)">Item 3</div>
    <div class="carousel-card" onclick="item(this)">Item 4</div>
    <div class="carousel-card" onclick="item(this)">Item 5</div>
    <div class="carousel-card" onclick="item(this)">Item 6</div>
    <div class="carousel-card" onclick="item(this)">Item 7</div>
    <div class="carousel-card" onclick="item(this)">Item 8</div>

    <div class="carousel-card" onclick="item(this)">Item 1</div>
    <div class="carousel-card" onclick="item(this)">Item 2</div>
    <div class="carousel-card" onclick="item(this)">Item 3</div>
    <div class="carousel-card" onclick="item(this)">Item 4</div>
    <div class="carousel-card" onclick="item(this)">Item 5</div>
    <div class="carousel-card" onclick="item(this)">Item 6</div>
    <div class="carousel-card" onclick="item(this)">Item 7</div>
    <div class="carousel-card" onclick="item(this)">Item 8</div>
  </div>
</div>
</body>
</html>
